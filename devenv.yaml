inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  crate2nix:
    url: github:nix-community/crate2nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  materializer:
    url: github:Alb-O/materializer
    flake: false
  committer:
    url: github:Alb-O/committer
    flake: false
  env-rust:
    url: github:Alb-O/env-rust
    flake: false
  env-docs:
    url: github:Alb-O/env-docs
    flake: false
  env-local-overrides:
    url: github:Alb-O/env-local-overrides
    flake: false
imports:
  - materializer
  - committer
  - env-rust
  - env-docs
  - env-local-overrides
