inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  crate2nix:
    url: github:nix-community/crate2nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  materializer:
    url: git+https://github.com/Alb-O/materializer.git?ref=main
    flake: false
  committer:
    url: git+https://github.com/Alb-O/committer.git?ref=main
    flake: false
  rust-base:
    url: github:Alb-O/rust-base-devenv-polyrepo
    flake: false
imports:
  - materializer
  - committer
  - rust-base
